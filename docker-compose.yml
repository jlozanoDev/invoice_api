services:
  mysql:
    image: mysql:8.0
    container_name: invoice_api_mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-invoice_api}
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
